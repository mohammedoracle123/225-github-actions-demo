version: 2.1

jobs:
  precheck:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - run:
          name: Precheck
          command: echo "Running precheck..." && sleep 2
      - run:
          name: Dependency check
          command: echo "Checking dependencies..." && sleep 2
      - run:
          name: License check
          command: echo "Checking licenses..." && sleep 1

  build:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - run:
          name: Build
          command: echo "Building project..." && sleep 3

  lint:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - run:
          name: Lint
          command: echo "Linting code..." && sleep 2

  unit-tests:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - run:
          name: Unit Tests
          command: echo "Running unit tests..." && sleep 3

  package:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - run:
          name: Package
          command: echo "Packaging..." && sleep 2

  integration:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - run:
          name: Integration Tests
          command: echo "Running integration tests..." && sleep 4

  deploy:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - run:
          name: Deploy
          command: echo "Deploying..." && sleep 2

workflows:
  hyd-pipeline:
    jobs:
      - precheck

      - build:
          requires:
            - precheck

      - lint:
          requires:
            - precheck

      - unit-tests:
          requires:
            - precheck

      - package:
          requires:
            - build
            - lint
            - unit-tests

      - integration:
          requires:
            - package

      - deploy:
          requires:
            - integration